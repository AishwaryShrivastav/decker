<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decker — Allow microphone</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
    }
    h1 { font-size: 22px; color: #2496ED; margin-bottom: 8px; }
    p { font-size: 14px; color: #9ca3af; max-width: 320px; margin: 0 0 24px; line-height: 1.5; }
    button {
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #2496ED;
      color: white;
      transition: background 0.2s;
    }
    button:hover { background: #1a7bc7; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .status { margin-top: 24px; font-size: 14px; padding: 12px; border-radius: 8px; max-width: 320px; }
    .status.success { background: #0d3d2e; color: #10b981; }
    .status.error { background: #3d1d1d; color: #ef4444; }
    .status.pending { color: #f59e0b; }
  </style>
</head>
<body>
  <h1>Decker</h1>
  <p>Decker needs microphone access to record your voice. Meet (for video calls) and Decker (for transcription) use mic separately — you can allow both. Click below.</p>
  <button id="allow" type="button">Allow microphone</button>
  <div id="status" class="status" style="display: none;"></div>

  <script src="permission.js"></script>
</body>
</html>
